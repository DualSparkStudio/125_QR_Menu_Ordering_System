version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurant_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-restaurant_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-restaurant_password}
      POSTGRES_DB: ${DB_NAME:-restaurant_ordering}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-restaurant_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurant_network

  redis:
    image: redis:7-alpine
    container_name: restaurant_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restaurant_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-restaurant_user}:${DB_PASSWORD:-restaurant_password}@postgres:5432/${DB_NAME:-restaurant_ordering}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      GUEST_APP_URL: ${GUEST_APP_URL:-http://localhost:3000}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      WHATSAPP_BUSINESS_TOKEN: ${WHATSAPP_BUSINESS_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - restaurant_network

  guest-app:
    build:
      context: ./guest-app
      dockerfile: Dockerfile
    container_name: restaurant_guest_app
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - restaurant_network

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: restaurant_admin_dashboard
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - restaurant_network

volumes:
  postgres_data:
  redis_data:

networks:
  restaurant_network:
    driver: bridge
